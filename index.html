<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Deployment Site</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .status {
            background: rgba(0,255,0,0.2);
            border: 1px solid rgba(0,255,0,0.5);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        button {
            background: white;
            color: #2a5298;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
        }

        .footer {
            margin-top: 30px;
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Test Deployment Successful</h1>

        <p>
            If you can see this page, your web server deployment is working correctly.
        </p>

        <div class="status">
            <strong>Status:</strong> Online
        </div>

        <p>
            Server time (browser local):
            <span id="time"></span>
        </p>

        <button onclick="runTest()">
            Test JavaScript
        </button>

        <div id="result"></div>

        <div class="footer">
            Generated test page • Ready for deployment
        </div>
    </div>

    <script>
        function updateTime() {
            document.getElementById('time').textContent =
                new Date().toLocaleString();
        }

        function runTest() {
            document.getElementById('result').innerHTML =
                '✅ JavaScript execution successful at ' +
                new Date().toLocaleTimeString();
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
